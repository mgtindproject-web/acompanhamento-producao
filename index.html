<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Megatec - Apontamento de Produção</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --v:#1b5e20;--v2:#2e7d32;--v3:#43a047;
  --am:#f9a825;--vm:#c62828;--az:#1565c0;
  --bg:#f4f6f8;--bd:#dde1e7;--tx:#1a1a2e;--mt:#6b7280;--wh:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx)}
header{
  background:linear-gradient(135deg,var(--v),var(--v2));
  color:#fff;height:60px;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;
  box-shadow:0 2px 10px rgba(0,0,0,.25);position:sticky;top:0;z-index:50
}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{
  width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;
  background:rgba(255,255,255,.1)
}
.brand-title{font-size:17px;font-weight:700}
.brand-sub{font-size:11px;opacity:.8}
.hdate{font-size:12px;opacity:.85}
.tabs{
  display:flex;gap:4px;padding:10px 16px 0;background:#fff;
  border-bottom:2px solid var(--bd);position:sticky;top:60px;z-index:40;overflow-x:auto
}
.tab{
  padding:10px 16px;border:none;background:none;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--mt);
  border-radius:8px 8px 0 0;border-bottom:3px solid transparent;
  transition:.2s;white-space:nowrap
}
.tab.on{color:var(--v2);border-bottom-color:var(--v2);background:#f0f7f0}
.tab:hover:not(.on){background:#f5f5f5}
.page{display:none;padding:20px;max-width:1400px;margin:0 auto}
.page.on{display:block}

/* Cards dashboard */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.card{
  background:#fff;border-radius:12px;padding:14px 16px;
  box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid var(--bd);
  cursor:pointer;transition:.15s
}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.15);transform:translateY(-1px)}
.card-val{font-size:24px;font-weight:800;margin-bottom:4px}
.card-lbl{font-size:11px;color:var(--mt);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.card-extra{font-size:11px;color:var(--mt);margin-top:4px}
.card.vd .card-val{color:var(--v2)}
.card.vm .card-val{color:var(--vm)}
.card.am .card-val{color:#e65100}
.card.az .card-val{color:var(--az)}

.section-title{font-size:15px;font-weight:700;margin:10px 0 8px}

/* Painel detalhe (drill-down) */
.detail{
  display:none;background:#fff;border-radius:12px;
  padding:14px 16px;margin-top:10px;border:1px solid var(--bd);
  box-shadow:0 1px 8px rgba(0,0,0,.07)
}
.detail.on{display:block}
.detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
.detail-title{font-size:14px;font-weight:700}
.detail-close{border:none;background:none;font-size:18px;color:var(--mt);cursor:pointer}

.filtros{
  display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;
  margin-bottom:10px
}
.filtros label{font-size:11px;font-weight:700;color:var(--mt);display:block;margin-bottom:3px}
.input{
  padding:7px 10px;border-radius:8px;border:1px solid var(--bd);
  font-size:13px;outline:none;min-width:120px;background:#fff
}
.input:focus{border-color:var(--v2)}
.btn{
  padding:8px 14px;border-radius:8px;border:none;font-size:13px;
  cursor:pointer;font-weight:600
}
.btn.pri{background:var(--v2);color:#fff}
.btn.sec{background:#fff;color:var(--v2);border:1px solid var(--v2)}
.btn.sm{padding:6px 10px;font-size:12px}

/* Tabelas */
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  background:#f8f9fa;padding:8px 6px;border-bottom:2px solid var(--bd);
  font-size:11px;color:var(--mt);text-align:left;text-transform:uppercase;letter-spacing:.4px
}
tbody td{
  border-bottom:1px solid var(--bd);padding:7px 6px;vertical-align:middle
}
tbody tr:hover{background:#f9fbff}
.badge{
  display:inline-block;padding:2px 7px;border-radius:16px;
  font-size:11px;font-weight:600
}
.b-setor{background:#e3f2fd;color:#0d47a1}
.b-prob{background:#ffebee;color:#b71c1c}
.b-ok{background:#e8f5e9;color:#1b5e20}
.percent-wrap{display:flex;align-items:center;gap:6px}
.bar{flex:1;height:6px;border-radius:3px;background:#e0e0e0;overflow:hidden}
.fill{height:100%;border-radius:3px}
.p-verde{background:var(--v3)}
.p-am{background:var(--am)}
.p-verm{background:#ef5350}
.p-txt{font-size:11px;font-weight:700}

.empty{padding:12px 6px;font-size:12px;color:var(--mt);text-align:center}
@media(max-width:700px){
  .filtros{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">M</div>
    <div>
      <div class="brand-title">Megatec Indústria</div>
      <div class="brand-sub">Apontamento de Produção</div>
    </div>
  </div>
  <div class="hdate" id="lblHoje"></div>
</header>

<div class="tabs">
  <button class="tab on" data-page="dash" onclick="changeTab(this)">Dashboard</button>
  <button class="tab" data-page="lista" onclick="changeTab(this)">Apontamentos</button>
</div>

<div id="page-dash" class="page on">
  <h2 class="section-title">Visão Geral</h2>
  <div class="cards" id="kpiCards"></div>

  <h2 class="section-title">Por Setor (clique para detalhar)</h2>
  <div class="cards" id="setorCards"></div>

  <div id="detailPanel" class="detail">
    <div class="detail-head">
      <div>
        <div class="detail-title" id="detailTitle"></div>
        <div style="font-size:11px;color:var(--mt);" id="detailInfo"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">×</button>
    </div>

    <div class="filtros">
      <div>
        <label>Data inicial</label>
        <input type="date" id="detDataIni" class="input" onchange="renderDetailRows()">
      </div>
      <div>
        <label>Data final</label>
        <input type="date" id="detDataFim" class="input" onchange="renderDetailRows()">
      </div>
      <div>
        <label>Cliente</label>
        <input type="text" id="detCliente" placeholder="Filtrar cliente" class="input" oninput="renderDetailRows()">
      </div>
      <div>
        <label>Produto</label>
        <input type="text" id="detProduto" placeholder="Filtrar produto" class="input" oninput="renderDetailRows()">
      </div>
      <button class="btn sec sm" onclick="clearDetailFilters()">Limpar filtros</button>
    </div>

    <div style="overflow:auto;max-height:420px;">
      <table>
        <thead>
          <tr>
            <th>Data</th><th>Equipamento</th><th>Cliente</th><th>Nº</th>
            <th>Progresso</th><th>Material</th><th>Projeto</th><th>Obs / Problema</th>
          </tr>
        </thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="page-lista" class="page">
  <h2 class="section-title">Apontamentos (Histórico)</h2>
  <div class="filtros">
    <div>
      <label>Data inicial</label>
      <input type="date" id="fDataIni" class="input" onchange="renderLista()">
    </div>
    <div>
      <label>Data final</label>
      <input type="date" id="fDataFim" class="input" onchange="renderLista()">
    </div>
    <div>
      <label>Setor</label>
      <select id="fSetor" class="input" onchange="renderLista()">
        <option value="">Todos</option>
        <option>Corte e Dobra</option>
        <option>Pré Montagem</option>
        <option>Montagem</option>
        <option>Pintura</option>
        <option>Acabamento</option>
      </select>
    </div>
    <div>
      <label>Cliente</label>
      <input type="text" id="fCliente" class="input" placeholder="Nome cliente" oninput="renderLista()">
    </div>
    <div>
      <label>Produto</label>
      <input type="text" id="fProduto" class="input" placeholder="Equipamento" oninput="renderLista()">
    </div>
    <button class="btn sec sm" onclick="clearListaFilters()">Limpar filtros</button>
    <button class="btn pri sm" style="margin-left:auto" onclick="exportarCSV()">Exportar CSV</button>
  </div>

  <div style="overflow:auto;max-height:520px;">
    <table>
      <thead>
        <tr>
          <th>Data</th><th>Setor</th><th>Equipamento</th><th>Cliente</th><th>Nº</th>
          <th>Prog.</th><th>Material</th><th>Projeto</th><th>Obs / Problema</th>
        </tr>
      </thead>
      <tbody id="listaBody"></tbody>
    </table>
  </div>
</div>

<script>
// ======= Dados (amostra reduzida a partir da planilha) =======
const registros = [
  // Vou trazer alguns exemplos de cada setor para não estourar o tamanho da mensagem.
  // Quando você validar o layout, posso gerar só o array completo em outra resposta.
  {data:'2025-05-29',setor:'Montagem',produto:'Rodocargas',cliente:'Grupo Vamos (Tereos)',num:'3',perc:90,material:'Não',matDesc:'',projeto:'Não',projDesc:'',obs:''},
  {data:'2025-05-29',setor:'Corte e Dobra',produto:'Transbordo MGT 22.000',cliente:'Zilor',num:'Lote 10',perc:20,material:'Sim',matDesc:'Faltou chapa 2,65',projeto:'Não',projDesc:'',obs:''},
  {data:'2025-06-02',setor:'Montagem',produto:'Aplicador de Vinhaça',cliente:'Jose Ricardo Fontanari',num:'1',perc:70,material:'Sim',matDesc:'Falta de mangueiras hidráulicas',projeto:'Sim',projDesc:'Falta ficha técnica completa',obs:''},
  {data:'2025-06-02',setor:'Montagem',produto:'Canavieiro Tela Expandida',cliente:'Estoque Megatec',num:'2',perc:50,material:'Sim',matDesc:'Falta espelhos, chapa mancal, assoalho, tela',projeto:'Sim',projDesc:'Desenho incompleto',obs:''},
  {data:'2025-06-02',setor:'Montagem',produto:'Rodomuda',cliente:'Grupo Vamos (Bevap)',num:'7',perc:90,material:'Sim',matDesc:'Faltando arcos amarração lona, reforço traseiro',projeto:'Sim',projDesc:'Qtd arcos desatualizada',obs:'Hidráulica pronta'},
  {data:'2025-06-02',setor:'Acabamento',produto:'Rodocargas',cliente:'Grupo Vamos (Tereos)',num:'3',perc:100,material:'Não',matDesc:'',projeto:'Não',projDesc:'',obs:'Só falta colocar placa traseira'},
  {data:'2025-06-03',setor:'Montagem',produto:'Aplicador de Vinhaça',cliente:'Jose Ricardo Fontanari',num:'1',perc:80,material:'Sim',matDesc:'Mangueiras hidráulicas; espigão 2"',projeto:'Sim',projDesc:'Projeto incompleto',obs:''},
  {data:'2025-06-03',setor:'Montagem',produto:'Transbordo MGT 22.000',cliente:'Estoque Megatec',num:'7',perc:80,material:'Não',matDesc:'',projeto:'Sim',projDesc:'Ponto de observação pistão giro',obs:''},
  {data:'2025-06-03',setor:'Acabamento',produto:'Rodocargas',cliente:'Grupo Vamos (Tereos)',num:'4',perc:50,material:'Sim',matDesc:'Colocar pistão do fominha',projeto:'Não',projDesc:'',obs:''},
  {data:'2025-06-05',setor:'Acabamento',produto:'Rodocargas',cliente:'Grupo Vamos (Tereos)',num:'4',perc:100,material:'Sim',matDesc:'Faltou anel trava rótula, chapas lona, arcos',projeto:'Não',projDesc:'',obs:''},
  {data:'2025-06-09',setor:'Corte e Dobra',produto:'Transbordo MGT 22.000',cliente:'Zilor',num:'10',perc:80,material:'Sim',matDesc:'Chapa 3/8 e 5/16',projeto:'Não',projDesc:'',obs:''},
  {data:'2025-06-09',setor:'Montagem',produto:'Canavieiro Tela Expandida',cliente:'Estoque Megatec',num:'2',perc:50,material:'Sim',matDesc:'Mesma situação 05/06',projeto:'Sim',projDesc:'Projeto faltando informações',obs:'Produto parado'},
  {data:'2026-02-26',setor:'Corte e Dobra',produto:'Transbordo MGT 22.000',cliente:'São João de Araras',num:'13',perc:90,material:'Sim',matDesc:'Falta chapa 5/16x1200x2100 e 3/8',projeto:'Não',projDesc:'',obs:''},
  {data:'2026-02-27',setor:'Montagem',produto:'Aplicador de Vinhaça',cliente:'São João de Araras',num:'2',perc:70,material:'Sim',matDesc:'Bomba, guarda corpo',projeto:'Não',projDesc:'',obs:''},
  {data:'2026-03-04',setor:'Acabamento',produto:'Transbordo Sobre Chassi',cliente:'Biopar',num:'1',perc:90,material:'Sim',matDesc:'Aguardando eixo tomada de força',projeto:'Sim',projDesc:'',obs:''},
  {data:'2026-03-05',setor:'Montagem',produto:'Rodomuda',cliente:'Da Mata',num:'8',perc:60,material:'Sim',matDesc:'Reforços caixa, quadro, chassis',projeto:'Não',projDesc:'',obs:''},
  {data:'2026-03-09',setor:'Montagem',produto:'Reboque 01+01',cliente:'Pedra Agroindustrial',num:'1',perc:90,material:'Sim',matDesc:'Mola',projeto:'Não',projDesc:'',obs:'Parado aguardando mola para suspensão'},
  {data:'2026-03-12',setor:'Pré Montagem',produto:'Transbordo MGT 22.000',cliente:'Atvos Bioenergia',num:'14',perc:80,material:'Não',matDesc:'',projeto:'Não',projDesc:'',obs:''},
  {data:'2026-03-18',setor:'Pré Montagem',produto:'Transbordo Sobre Chassi',cliente:'Umoe',num:'2',perc:20,material:'Sim',matDesc:'',projeto:'Sim',projDesc:'Projeto errado',obs:''},
  {data:'2026-03-23',setor:'Acabamento',produto:'Aplicador de Vinhaça',cliente:'São João de Araras',num:'1',perc:70,material:'Sim',matDesc:'Mangueiras',projeto:'Sim',projDesc:'Mangueiras erradas',obs:''},
  {data:'2026-03-30',setor:'Pré Montagem',produto:'Transbordo MGT 22.000',cliente:'Atena',num:'4',perc:100,material:'Sim',matDesc:'Usinagem cabeçalho quantidade errada',projeto:'Sim',projDesc:'Lista peças incorreta',obs:''}
];

// ======= Utilitários =======
function fmtData(iso){
  if(!iso) return '';
  const [a,m,d] = iso.split('-');
  return `${d}/${m}/${a}`;
}
function percClass(p){
  if(p>=90) return 'p-verde';
  if(p>=50) return 'p-am';
  return 'p-verm';
}
function countProblema(reg){
  return (reg.material==='Sim' || reg.projeto==='Sim');
}

// ======= Tabs =======
function changeTab(btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const page = btn.dataset.page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('page-'+page).classList.add('on');
}

// ======= Dashboard =======
let currentSetor = null;

function buildDashboard(){
  const total = registros.length;
  const concluidos = registros.filter(r=>(parseInt(r.perc)||0)>=100).length;
  const comProb = registros.filter(r=>countProblema(r)).length;
  const mediaPerc = registros.reduce((s,r)=>s+(parseInt(r.perc)||0),0) / (total||1);

  const kpi = document.getElementById('kpiCards');
  kpi.innerHTML = `
    <div class="card vd">
      <div class="card-lbl">Registros</div>
      <div class="card-val">${total}</div>
      <div class="card-extra">Total de apontamentos históricos</div>
    </div>
    <div class="card az">
      <div class="card-lbl">% médio</div>
      <div class="card-val">${mediaPerc.toFixed(0)}%</div>
      <div class="card-extra">Progresso médio dos produtos</div>
    </div>
    <div class="card vm">
      <div class="card-lbl">Com problemas</div>
      <div class="card-val">${comProb}</div>
      <div class="card-extra">Material ou projeto marcados como "Sim"</div>
    </div>
    <div class="card am">
      <div class="card-lbl">Concluídos</div>
      <div class="card-val">${concluidos}</div>
      <div class="card-extra">Registros com 100% de evolução</div>
    </div>
  `;

  const setores = ['Corte e Dobra','Pré Montagem','Montagem','Pintura','Acabamento'];
  const cont = document.getElementById('setorCards');
  cont.innerHTML = setores.map(setor=>{
    const arr = registros.filter(r=>r.setor===setor);
    if(!arr.length) return '';
    const qtd = arr.length;
    const media = arr.reduce((s,r)=>s+(parseInt(r.perc)||0),0)/(qtd||1);
    const prob = arr.filter(r=>countProblema(r)).length;
    return `
      <div class="card" onclick="openDetail('${setor}')">
        <div class="card-lbl">${setor}</div>
        <div class="card-val">${media.toFixed(0)}%</div>
        <div class="card-extra">${qtd} apontamentos • ${prob} com problema</div>
        <div class="card-extra" style="color:${prob? '#b71c1c':'#1b5e20'};">
          ${prob? '⚠ Há pendências registradas':'✓ Sem problemas marcados'}
        </div>
      </div>
    `;
  }).join('');
}

function openDetail(setor){
  currentSetor = setor;
  const arr = registros.filter(r=>r.setor===setor);
  const q = arr.length;
  const med = arr.reduce((s,r)=>s+(parseInt(r.perc)||0),0)/(q||1);
  const prob = arr.filter(r=>countProblema(r)).length;
  document.getElementById('detailTitle').textContent = `Detalhe do setor: ${setor}`;
  document.getElementById('detailInfo').textContent =
    `${q} registros • ${med.toFixed(0)}% de média • ${prob} com falta de material ou problema de projeto`;
  document.getElementById('detailPanel').classList.add('on');
  document.getElementById('detDataIni').value = '';
  document.getElementById('detDataFim').value = '';
  document.getElementById('detCliente').value = '';
  document.getElementById('detProduto').value = '';
  renderDetailRows();
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('on');
  currentSetor = null;
}

function renderDetailRows(){
  if(!currentSetor) return;
  const ini = document.getElementById('detDataIni').value;
  const fim = document.getElementById('detDataFim').value;
  const cli = document.getElementById('detCliente').value.toLowerCase();
  const prod = document.getElementById('detProduto').value.toLowerCase();

  let arr = registros.filter(r=>r.setor===currentSetor);
  if(ini) arr = arr.filter(r=>r.data>=ini);
  if(fim) arr = arr.filter(r=>r.data<=fim);
  if(cli) arr = arr.filter(r=> (r.cliente||'').toLowerCase().includes(cli));
  if(prod) arr = arr.filter(r=> (r.produto||'').toLowerCase().includes(prod));

  const tbody = document.getElementById('detailBody');
  if(!arr.length){
    tbody.innerHTML = `<tr><td colspan="8" class="empty">Nenhum registro encontrado para os filtros selecionados.</td></tr>`;
    return;
  }
  tbody.innerHTML = arr.map(r=>{
    const p = parseInt(r.perc)||0;
    const barClass = percClass(p);
    const mat = r.material==='Sim';
    const proj = r.projeto==='Sim';
    const probTxt = (mat ? 'Material: '+(r.matDesc||'') : '') +
                    ((mat && proj)? ' | ' : '') +
                    (proj ? 'Projeto: '+(r.projDesc||'') : '');
    const obs = r.obs || '';
    return `
      <tr>
        <td>${fmtData(r.data)}</td>
        <td style="font-weight:600">${r.produto||''}</td>
        <td>${r.cliente||''}</td>
        <td style="text-align:center">${r.num||''}</td>
        <td>
          <div class="percent-wrap">
            <div class="bar"><div class="fill ${barClass}" style="width:${p}%"></div></div>
            <div class="p-txt">${p}%</div>
          </div>
        </td>
        <td>${mat?'<span class="badge b-prob">Sim</span>':'<span class="badge b-ok">Não</span>'}</td>
        <td>${proj?'<span class="badge b-prob">Sim</span>':'<span class="badge b-ok">Não</span>'}</td>
        <td style="font-size:11px;color:var(--mt)">
          ${probTxt || obs || '—'}
        </td>
      </tr>
    `;
  }).join('');
}

function clearDetailFilters(){
  ['detDataIni','detDataFim','detCliente','detProduto'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  renderDetailRows();
}

// ======= Lista histórica =======
function renderLista(){
  const ini = document.getElementById('fDataIni').value;
  const fim = document.getElementById('fDataFim').value;
  const setor = document.getElementById('fSetor').value;
  const cli = document.getElementById('fCliente').value.toLowerCase();
  const prod = document.getElementById('fProduto').value.toLowerCase();

  let arr = [...registros].reverse();
  if(ini) arr = arr.filter(r=>r.data>=ini);
  if(fim) arr = arr.filter(r=>r.data<=fim);
  if(setor) arr = arr.filter(r=>r.setor===setor);
  if(cli) arr = arr.filter(r=>(r.cliente||'').toLowerCase().includes(cli));
  if(prod) arr = arr.filter(r=>(r.produto||'').toLowerCase().includes(prod));

  const tbody = document.getElementById('listaBody');
  if(!arr.length){
    tbody.innerHTML = `<tr><td colspan="9" class="empty">Nenhum registro para os filtros selecionados.</td></tr>`;
    return;
  }
  tbody.innerHTML = arr.map(r=>{
    const p=parseInt(r.perc)||0;
    const barClass=percClass(p);
    const mat=r.material==='Sim';
    const proj=r.projeto==='Sim';
    const probTxt=(mat ? 'Material: '+(r.matDesc||'') : '')+
                  ((mat && proj)?' | ':'')+
                  (proj ? 'Projeto: '+(r.projDesc||'') : '');
    const obs = r.obs || '';
    return `
      <tr>
        <td>${fmtData(r.data)}</td>
        <td><span class="badge b-setor">${r.setor}</span></td>
        <td style="font-weight:600">${r.produto||''}</td>
        <td>${r.cliente||''}</td>
        <td style="text-align:center">${r.num||''}</td>
        <td>
          <div class="percent-wrap">
            <div class="bar"><div class="fill ${barClass}" style="width:${p}%"></div></div>
            <div class="p-txt">${p}%</div>
          </div>
        </td>
        <td>${mat?'<span class="badge b-prob">Sim</span>':'<span class="badge b-ok">Não</span>'}</td>
        <td>${proj?'<span class="badge b-prob">Sim</span>':'<span class="badge b-ok">Não</span>'}</td>
        <td style="font-size:11px;color:var(--mt)">${probTxt || obs || '—'}</td>
      </tr>
    `;
  }).join('');
}

function clearListaFilters(){
  ['fDataIni','fDataFim','fSetor','fCliente','fProduto'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  renderLista();
}

// ======= Exportar CSV =======
function exportarCSV(){
  if(!registros.length){alert('Sem dados para exportar.');return;}
  const cols = ['data','setor','produto','cliente','num','perc','material','matDesc','projeto','projDesc','obs'];
  const header = cols.join(';');
  const linhas = [header];
  registros.forEach(r=>{
    const linha = cols.map(c=>{
      const v = (r[c]!==undefined && r[c]!==null)? String(r[c]) : '';
      return `"${v.replace(/"/g,'""')}"`;
    }).join(';');
    linhas.push(linha);
  });
  const csv = '\uFEFF'+linhas.join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'apontamentos_megatec.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ======= Init =======
(function init(){
  const hoje = new Date();
  const d = String(hoje.getDate()).padStart(2,'0');
  const m = String(hoje.getMonth()+1).padStart(2,'0');
  const a = hoje.getFullYear();
  document.getElementById('lblHoje').textContent = `Hoje: ${d}/${m}/${a}`;
  buildDashboard();
  renderLista();
})();
</script>
