<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Megatec — Apontamento de Produção</title>
<style>
:root{
  --verde:#1b5e20;--verde2:#2e7d32;--verde3:#43a047;
  --amarelo:#f9a825;--vermelho:#c62828;--azul:#1565c0;
  --cinza:#f4f6f8;--borda:#dde1e7;--texto:#1a1a2e;
  --muted:#6b7280;--branco:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--cinza);color:var(--texto);min-height:100vh}
header{
  background:linear-gradient(135deg,var(--verde) 0%,var(--verde2) 100%);
  color:#fff;height:60px;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;
  box-shadow:0 2px 10px rgba(0,0,0,.25);position:sticky;top:0;z-index:50
}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{
  width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;
  background:rgba(255,255,255,.1)
}
.brand-title{font-size:17px;font-weight:700}
.brand-sub{font-size:11px;opacity:.8}
.header-date{font-size:12px;opacity:.85}
.tabs{
  display:flex;gap:4px;padding:12px 16px 0;
  background:#fff;border-bottom:2px solid var(--borda);
  position:sticky;top:60px;z-index:40;
}
.tab{
  padding:10px 18px;border:none;background:none;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--muted);border-radius:8px 8px 0 0;
  border-bottom:3px solid transparent;transition:.2s
}
.tab.ativo{color:var(--verde2);border-bottom-color:var(--verde2);background:#f0f7f0}
.tab:hover:not(.ativo){background:#f5f5f5}
.pagina{display:none;padding:20px;max-width:1400px;margin:0 auto}
.pagina.ativa{display:block}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.card{
  background:#fff;border-radius:12px;padding:16px;
  box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid var(--borda)
}
.card-val{font-size:28px;font-weight:800;margin-bottom:4px}
.card-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.card.verde .card-val{color:var(--verde2)}
.card.vermelho .card-val{color:var(--vermelho)}
.card.amarelo .card-val{color:#e65100}
.card.azul .card-val{color:var(--azul)}
.section-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--texto)}
.problema-card{
  background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px;
  border-left:4px solid var(--vermelho);box-shadow:0 1px 5px rgba(0,0,0,.06)
}
.problema-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.problema-titulo{font-weight:700;font-size:13px}
.problema-desc{font-size:12px;color:var(--muted);margin-top:3px}
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.3px
}
.badge-verde{background:#e8f5e9;color:#1b5e20}
.badge-vermelho{background:#ffebee;color:#c62828}
.badge-amarelo{background:#fff8e1;color:#e65100}
.badge-azul{background:#e3f2fd;color:#1565c0}
.badge-cinza{background:#f5f5f5;color:#555}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  background:#f8f9fa;padding:10px 8px;text-align:left;
  font-weight:700;font-size:11px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--borda)
}
tbody tr{border-bottom:1px solid var(--borda);transition:.15s}
tbody tr:hover{background:#f9fbff}
tbody td{padding:9px 8px;vertical-align:middle}
.perc-wrap{display:flex;align-items:center;gap:6px;min-width:90px}
.perc-bar{flex:1;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.perc-fill{height:100%;border-radius:3px;transition:.3s}
.perc-verde{background:var(--verde3)}
.perc-amarelo{background:var(--amarelo)}
.perc-vermelho{background:var(--vermelho)}
.perc-text{font-size:11px;font-weight:700;min-width:28px}
.filtros-box{
  background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;
  border:1px solid var(--borda);display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end
}
.filtros-box label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px}
.filtros-box input,.filtros-box select{
  padding:7px 10px;border:1px solid var(--borda);border-radius:8px;
  font-size:13px;background:#fff;outline:none;
}
.filtros-box input:focus,.filtros-box select:focus{border-color:var(--verde2)}
.btn{
  padding:8px 16px;border:none;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:6px
}
.btn-primary{background:var(--verde2);color:#fff}
.btn-primary:hover{background:var(--verde)}
.btn-secondary{background:#f5f5f5;color:#333;border:1px solid var(--borda)}
.btn-secondary:hover{background:#e0e0e0}
.btn-danger{background:#ffebee;color:var(--vermelho);border:1px solid #ffcdd2}
.btn-danger:hover{background:#ffcdd2}
.btn-sm{padding:5px 10px;font-size:11px}
.table-wrap{background:#fff;border-radius:12px;border:1px solid var(--borda);overflow:auto}
.form-card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--borda);max-width:700px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;font-weight:700;color:var(--muted)}
.form-group input,.form-group select,.form-group textarea{
  padding:9px 12px;border:1px solid var(--borda);border-radius:8px;
  font-size:13px;outline:none;font-family:inherit;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--verde2)}
.form-group textarea{resize:vertical;min-height:70px}
.form-full{grid-column:1/-1}
.cond-box{display:none;grid-column:1/-1;padding:12px;background:#fff8f8;border-radius:8px;border:1px solid #ffcdd2}
.cond-box.show{display:block}
.toast{
  position:fixed;bottom:24px;right:24px;background:#333;color:#fff;
  padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;
  transform:translateY(60px);opacity:0;transition:.3s;pointer-events:none
}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--verde2)}
.toast.err{background:var(--vermelho)}
.empty{text-align:center;color:var(--muted);padding:32px;font-size:13px}
.setor-icon{font-size:13px}
@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .tabs{overflow-x:auto}
  .tab{white-space:nowrap;font-size:12px;padding:8px 12px}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">M</div>
    <div>
      <div class="brand-title">Megatec Indústria</div>
      <div class="brand-sub">Apontamento de Produção</div>
    </div>
  </div>
  <div class="header-date" id="lblHoje"></div>
</header>

<div class="tabs">
  <button class="tab ativo" onclick="mudarAba('dashboard')">📊 Dashboard</button>
  <button class="tab" onclick="mudarAba('producao')">🏭 Produção</button>
  <button class="tab" onclick="mudarAba('problemas')">⚠️ Problemas</button>
  <button class="tab" onclick="mudarAba('historico')">📋 Histórico</button>
  <button class="tab" onclick="mudarAba('apontamento')">➕ Novo Apontamento</button>
</div>

<!-- DASHBOARD -->
<div class="pagina ativa" id="pg-dashboard">
  <div class="cards-grid" id="cards-dashboard"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;flex-wrap:wrap">
    <div>
      <div class="section-title">⚠️ Problemas em Aberto</div>
      <div id="lista-problemas-dash"></div>
    </div>
    <div>
      <div class="section-title">📈 Evolução por Setor (último apontamento)</div>
      <div id="setor-status"></div>
    </div>
  </div>
</div>

<!-- PRODUÇÃO -->
<div class="pagina" id="pg-producao">
  <div class="filtros-box">
    <div>
      <label>Setor</label>
      <select id="f-setor" onchange="filtrarProducao()">
        <option value="">Todos</option>
        <option>Corte e Dobra</option>
        <option>Pré Montagem</option>
        <option>Montagem</option>
        <option>Pintura</option>
        <option>Acabamento</option>
      </select>
    </div>
    <div>
      <label>Produto</label>
      <input id="f-produto" placeholder="Buscar produto..." oninput="filtrarProducao()"/>
    </div>
    <div>
      <label>Cliente</label>
      <input id="f-cliente" placeholder="Buscar cliente..." oninput="filtrarProducao()"/>
    </div>
    <div>
      <label>Data</label>
      <input type="date" id="f-data" onchange="filtrarProducao()"/>
    </div>
    <button class="btn btn-secondary" onclick="limparFiltros()">✕ Limpar</button>
    <button class="btn btn-primary" onclick="exportarCSV()">⬇️ Exportar CSV</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th><th>Setor</th><th>Produto</th><th>Cliente</th>
          <th>Nº</th><th>Evolução</th><th>Material</th><th>Projeto</th><th>Obs</th>
        </tr>
      </thead>
      <tbody id="tabela-producao"></tbody>
    </table>
  </div>
</div>

<!-- PROBLEMAS -->
<div class="pagina" id="pg-problemas">
  <div class="section-title" style="margin-bottom:16px">⚠️ Todos os Problemas Registrados</div>
  <div id="lista-problemas-full"></div>
</div>

<!-- HISTÓRICO -->
<div class="pagina" id="pg-historico">
  <div class="filtros-box">
    <div>
      <label>Data Inicial</label>
      <input type="date" id="h-ini" onchange="filtrarHistorico()"/>
    </div>
    <div>
      <label>Data Final</label>
      <input type="date" id="h-fim" onchange="filtrarHistorico()"/>
    </div>
    <div>
      <label>Setor</label>
      <select id="h-setor" onchange="filtrarHistorico()">
        <option value="">Todos</option>
        <option>Corte e Dobra</option>
        <option>Pré Montagem</option>
        <option>Montagem</option>
        <option>Pintura</option>
        <option>Acabamento</option>
      </select>
    </div>
    <div>
      <label>Produto</label>
      <input id="h-produto" placeholder="Filtrar produto..." oninput="filtrarHistorico()"/>
    </div>
    <button class="btn btn-secondary" onclick="limparFiltrosHist()">✕ Limpar</button>
    <button class="btn btn-primary" onclick="exportarCSVHist()">⬇️ Exportar CSV</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th><th>Setor</th><th>Produto</th><th>Cliente</th>
          <th>Nº</th><th>Evolução</th><th>Material?</th><th>Projeto?</th><th>Obs</th>
        </tr>
      </thead>
      <tbody id="tabela-historico"></tbody>
    </table>
  </div>
</div>

<!-- APONTAMENTO -->
<div class="pagina" id="pg-apontamento">
  <div class="form-card">
    <div class="section-title" style="margin-bottom:16px">➕ Novo Apontamento de Produção</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Data *</label>
        <input type="date" id="fData"/>
      </div>
      <div class="form-group">
        <label>Setor *</label>
        <select id="fSetor">
          <option value="">Selecione...</option>
          <option>Corte e Dobra</option>
          <option>Pré Montagem</option>
          <option>Montagem</option>
          <option>Pintura</option>
          <option>Acabamento</option>
        </select>
      </div>
      <div class="form-group">
        <label>Produto *</label>
        <input id="fProduto" placeholder="Ex: Transbordo MGT 22.000"/>
      </div>
      <div class="form-group">
        <label>Cliente *</label>
        <input id="fCliente" placeholder="Ex: Zilor"/>
      </div>
      <div class="form-group">
        <label>Número do Equipamento</label>
        <input id="fNumero" placeholder="Ex: 1, Lote 5..."/>
      </div>
      <div class="form-group">
        <label>% de Evolução</label>
        <input type="number" id="fPerc" min="0" max="100" placeholder="0 a 100"/>
      </div>
      <div class="form-group">
        <label>Falta de Material?</label>
        <select id="fMaterial" onchange="toggleMaterial()">
          <option value="Não">Não</option>
          <option value="Sim">Sim</option>
        </select>
      </div>
      <div class="form-group">
        <label>Problema de Projeto?</label>
        <select id="fProjeto" onchange="toggleProjeto()">
          <option value="Não">Não</option>
          <option value="Sim">Sim</option>
        </select>
      </div>
      <div class="cond-box" id="boxMaterial">
        <div class="form-group">
          <label>Descreva o problema de material</label>
          <textarea id="fMatDesc" placeholder="Ex: Falta chapa 2,65mm..."></textarea>
        </div>
      </div>
      <div class="cond-box" id="boxProjeto">
        <div class="form-group">
          <label>Descreva o problema de projeto</label>
          <textarea id="fProjDesc" placeholder="Ex: Projeto incompleto..."></textarea>
        </div>
      </div>
      <div class="form-group form-full">
        <label>Observações Gerais</label>
        <textarea id="fObs" placeholder="Informações adicionais..."></textarea>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-primary" onclick="salvarApontamento()">💾 Salvar Apontamento</button>
      <button class="btn btn-secondary" onclick="limparForm()">✕ Limpar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ===== ESTADO =====
let registros = [];
let editId = null;

function gerarId(){return 'r'+Date.now()+'_'+Math.random().toString(36).substr(2,6)}
function salvarLocal(){localStorage.setItem('megatec_reg',JSON.stringify(registros))}
function carregarLocal(){
  const s = localStorage.getItem('megatec_reg');
  if(s){
    registros = JSON.parse(s);
  } else {
    registros = dadosIniciais.map(r=>({...r, id:gerarId(), timestamp:new Date().toISOString()}));
    salvarLocal();
  }
}

// ===== NAVEGAÇÃO =====
function mudarAba(aba){
  document.querySelectorAll('.pagina').forEach(p=>p.classList.remove('ativa'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo'));
  document.getElementById('pg-'+aba).classList.add('ativa');
  event.currentTarget.classList.add('ativo');
  if(aba==='dashboard') renderDashboard();
  if(aba==='producao') renderProducao();
  if(aba==='problemas') renderProblemas();
  if(aba==='historico') renderHistorico();
  if(aba==='apontamento'){limparForm();}
}

// ===== TOAST =====
function toast(msg,tipo='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(tipo==='ok'?'ok':'err');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}

// ===== UTILS =====
function fmtData(d){
  if(!d) return '—';
  const p = d.split('-');
  return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d;
}
function percClass(p){return p>=80?'perc-verde':p>=40?'perc-amarelo':'perc-vermelho'}
function setorBadge(s){
  const m={'Corte e Dobra':'azul','Pré Montagem':'cinza','Montagem':'amarelo','Pintura':'azul','Acabamento':'verde'};
  return m[s]||'cinza';
}

// ===== DASHBOARD =====
function renderDashboard(){
  const total = registros.length;
  const comProb = registros.filter(r=>r.material==='Sim'||r.projeto==='Sim').length;
  const concluidos = registros.filter(r=>parseInt(r.perc)===100).length;
  const percMedio = total>0?Math.round(registros.reduce((a,r)=>a+(parseInt(r.perc)||0),0)/total):0;

  document.getElementById('cards-dashboard').innerHTML=`
    <div class="card verde"><div class="card-val">${total}</div><div class="card-lbl">Total de Apontamentos</div></div>
    <div class="card azul"><div class="card-val">${concluidos}</div><div class="card-lbl">Concluídos (100%)</div></div>
    <div class="card vermelho"><div class="card-val">${comProb}</div><div class="card-lbl">Com Problemas</div></div>
    <div class="card amarelo"><div class="card-val">${percMedio}%</div><div class="card-lbl">Evolução Média</div></div>
  `;

  const probs = registros.filter(r=>r.material==='Sim'||r.projeto==='Sim').slice(-8).reverse();
  const lp = document.getElementById('lista-problemas-dash');
  if(!probs.length){lp.innerHTML='<div class="empty">Nenhum problema registrado</div>';return;}
  lp.innerHTML = probs.map(p=>`
    <div class="problema-card">
      <div class="problema-header">
        <span class="problema-titulo">${p.produto} — ${p.cliente} (Nº ${p.num||'—'})</span>
        <span class="badge badge-${setorBadge(p.setor)}">${p.setor}</span>
      </div>
      <div class="problema-desc">${fmtData(p.data)}</div>
      ${p.material==='Sim'?`<div class="problema-desc" style="color:#c62828">🔩 Material: ${p.matDesc||'—'}</div>`:''}
      ${p.projeto==='Sim'?`<div class="problema-desc" style="color:#1565c0">📐 Projeto: ${p.projDesc||'—'}</div>`:''}
    </div>`).join('');

  // Setor status
  const setores = ['Corte e Dobra','Pré Montagem','Montagem','Pintura','Acabamento'];
  const ss = document.getElementById('setor-status');
  ss.innerHTML = setores.map(s=>{
    const regs = registros.filter(r=>r.setor===s);
    if(!regs.length) return '';
    const ultimo = regs[regs.length-1];
    const p = parseInt(ultimo.perc)||0;
    return `<div class="card" style="margin-bottom:8px;padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;font-weight:700">${s}</span>
        <span class="badge badge-${setorBadge(s)}">${regs.length} reg.</span>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Último: ${ultimo.produto} — ${fmtData(ultimo.data)}</div>
      <div class="perc-wrap">
        <div class="perc-bar"><div class="perc-fill ${percClass(p)}" style="width:${p}%"></div></div>
        <div class="perc-text">${p}%</div>
      </div>
    </div>`;
  }).join('');
}

// ===== PRODUÇÃO =====
function renderProducao(){filtrarProducao();}
function filtrarProducao(){
  const setor = document.getElementById('f-setor').value;
  const produto = document.getElementById('f-produto').value.toLowerCase();
  const cliente = document.getElementById('f-cliente').value.toLowerCase();
  const data = document.getElementById('f-data').value;

  let filtrado = [...registros].reverse();
  if(setor) filtrado = filtrado.filter(r=>r.setor===setor);
  if(produto) filtrado = filtrado.filter(r=>r.produto.toLowerCase().includes(produto));
  if(cliente) filtrado = filtrado.filter(r=>r.cliente.toLowerCase().includes(cliente));
  if(data) filtrado = filtrado.filter(r=>r.data===data);

  const tbody = document.getElementById('tabela-producao');
  if(!filtrado.length){tbody.innerHTML='<tr><td colspan="9" class="empty">Nenhum registro encontrado.</td></tr>';return;}
  tbody.innerHTML = filtrado.map(r=>{
    const p=parseInt(r.perc)||0;
    return `<tr>
      <td>${fmtData(r.data)}</td>
      <td><span class="badge badge-${setorBadge(r.setor)}">${r.setor}</span></td>
      <td style="font-weight:600">${r.produto||'—'}</td>
      <td>${r.cliente||'—'}</td>
      <td style="text-align:center">${r.num||'—'}</td>
      <td><div class="perc-wrap">
        <div class="perc-bar"><div class="perc-fill ${percClass(p)}" style="width:${p}%"></div></div>
        <div class="perc-text">${p}%</div>
      </div></td>
      <td>${r.material==='Sim'?'<span class="badge badge-vermelho">⚠ Sim</span>':'<span class="badge badge-verde">✓ Não</span>'}</td>
      <td>${r.projeto==='Sim'?'<span class="badge badge-vermelho">⚠ Sim</span>':'<span class="badge badge-verde">✓ Não</span>'}</td>
      <td style="font-size:11px;color:var(--muted);max-width:150px">${r.obs||'—'}</td>
    </tr>`;
  }).join('');
}
function limparFiltros(){
  ['f-setor','f-produto','f-cliente','f-data'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  filtrarProducao();
}

  if(fim)f=f.filter(r=>r.data<=fim);
  if(setor)f=f.filter(r=>r.setor===setor);
  if(produto)f=f.filter(r=>r.produto.toLowerCase().includes(produto));
  gerarCSV(f,'historico_megatec.csv');
}
function gerarCSV(dados,nome){
  if(!dados.length){toast('Nenhum dado para exportar','err');return;}
  const h=['data','setor','produto','cliente','num','perc','material','matDesc','projeto','projDesc','obs'];
  const linhas=[h.join(';')];
  dados.forEach(r=>{
    linhas.push(h.map(c=>`"${String(r[c]||'').replace(/"/g,'""')}"`).join(';'));
  });
  const blob=new Blob(['\ufeff'+linhas.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=nome;document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('CSV exportado com sucesso!');
}
