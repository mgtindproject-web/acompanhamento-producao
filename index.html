<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Megatec - Apontamento de Produção</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --v:#1b5e20;--v2:#2e7d32;--v3:#43a047;
  --am:#f9a825;--vm:#c62828;--az:#1565c0;
  --bg:#f4f6f8;--bd:#dde1e7;--tx:#1a1a2e;--mt:#6b7280;--wh:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx)}
header{
  background:linear-gradient(135deg,var(--v),var(--v2));
  color:#fff;height:60px;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;
  box-shadow:0 2px 10px rgba(0,0,0,.25);position:sticky;top:0;z-index:50
}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{
  width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;
  background:rgba(255,255,255,.1)
}
.brand-title{font-size:17px;font-weight:700}
.brand-sub{font-size:11px;opacity:.8}
.hdate{font-size:12px;opacity:.85}
.tabs{
  display:flex;gap:4px;padding:10px 16px 0;background:#fff;
  border-bottom:2px solid var(--bd);position:sticky;top:60px;z-index:40;overflow-x:auto
}
.tab{
  padding:10px 16px;border:none;background:none;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--mt);
  border-radius:8px 8px 0 0;border-bottom:3px solid transparent;
  transition:.2s;white-space:nowrap
}
.tab.on{color:var(--v2);border-bottom-color:var(--v2);background:#f0f7f0}
.tab:hover:not(.on){background:#f5f5f5}
.page{display:none;padding:20px;max-width:1400px;margin:0 auto}
.page.on{display:block}

/* Cards dashboard */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.card{
  background:#fff;border-radius:12px;padding:14px 16px;
  box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid var(--bd);
  cursor:pointer;transition:.15s
}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.15);transform:translateY(-1px)}
.card-val{font-size:24px;font-weight:800;margin-bottom:4px}
.card-lbl{font-size:11px;color:var(--mt);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.card-extra{font-size:11px;color:var(--mt);margin-top:4px}
.card.vd .card-val{color:var(--v2)}
.card.vm .card-val{color:var(--vm)}
.card.am .card-val{color:#e65100}
.card.az .card-val{color:var(--az)}

.section-title{font-size:15px;font-weight:700;margin:10px 0 8px}

/* Painel detalhe (drill-down) */
.detail{
  display:none;background:#fff;border-radius:12px;
  padding:14px 16px;margin-top:10px;border:1px solid var(--bd);
  box-shadow:0 1px 8px rgba(0,0,0,.07)
}
.detail.on{display:block}
.detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
.detail-title{font-size:14px;font-weight:700}
.detail-close{border:none;background:none;font-size:18px;color:var(--mt);cursor:pointer}

.filtros{
  display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;
  margin-bottom:10px
}
.filtros label{font-size:11px;font-weight:700;color:var(--mt);display:block;margin-bottom:3px}
.input{
  padding:7px 10px;border-radius:8px;border:1px solid var(--bd);
  font-size:13px;outline:none;min-width:120px;background:#fff
}
.input:focus{border-color:var(--v2)}
.btn{
  padding:8px 14px;border-radius:8px;border:none;font-size:13px;
  cursor:pointer;font-weight:600
}
.btn.pri{background:var(--v2);color:#fff}
.btn.sec{background:#fff;color:var(--v2);border:1px solid var(--v2)}
.btn.sm{padding:6px 10px;font-size:12px}

/* Tabelas */
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  background:#f8f9fa;padding:8px 6px;border-bottom:2px solid var(--bd);
  font-size:11px;color:var(--mt);text-align:left;text-transform:uppercase;letter-spacing:.4px
}
tbody td{
  border-bottom:1px solid var(--bd);padding:7px 6px;vertical-align:middle
}
tbody tr:hover{background:#f9fbff}
.badge{
  display:inline-block;padding:2px 7px;border-radius:16px;
  font-size:11px;font-weight:600
}
.b-setor{background:#e3f2fd;color:#0d47a1}
.b-prob{background:#ffebee;color:#b71c1c}
.b-ok{background:#e8f5e9;color:#1b5e20}
.percent-wrap{display:flex;align-items:center;gap:6px}
.bar{flex:1;height:6px;border-radius:3px;background:#e0e0e0;overflow:hidden}
.fill{height:100%;border-radius:3px}
.p-verde{background:var(--v3)}
.p-am{background:var(--am)}
.p-verm{background:#ef5350}
.p-txt{font-size:11px;font-weight:700}

.empty{padding:12px 6px;font-size:12px;color:var(--mt);text-align:center}
@media(max-width:700px){
  .filtros{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">M</div>
    <div>
      <div class="brand-title">Megatec Indústria</div>
      <div class="brand-sub">Apontamento de Produção</div>
    </div>
  </div>
  <div class="hdate" id="lblHoje"></div>
</header>

<div class="tabs">
  <button class="tab on" data-page="dash" onclick="changeTab(this)">Dashboard</button>
  <button class="tab" data-page="lista" onclick="changeTab(this)">Apontamentos</button>
</div>

<div id="page-dash" class="page on">
  <h2 class="section-title">Visão Geral</h2>
  <div class="cards" id="kpiCards"></div>

  <h2 class="section-title">Por Setor (clique para detalhar)</h2>
  <div class="cards" id="setorCards"></div>

  <div id="detailPanel" class="detail">
    <div class="detail-head">
      <div>
        <div class="detail-title" id="detailTitle"></div>
        <div style="font-size:11px;color:var(--mt);" id="detailInfo"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">×</button>
    </div>

    <div class="filtros">
      <div>
        <label>Data inicial</label>
        <input type="date" id="detDataIni" class="input" onchange="renderDetailRows()">
      </div>
      <div>
        <label>Data final</label>
        <input type="date" id="detDataFim" class="input" onchange="renderDetailRows()">
      </div>
      <div>
        <label>Cliente</label>
        <input type="text" id="detCliente" placeholder="Filtrar cliente" class="input" oninput="renderDetailRows()">
      </div>
      <div>
        <label>Produto</label>
        <input type="text" id="detProduto" placeholder="Filtrar produto" class="input" oninput="renderDetailRows()">
      </div>
      <button class="btn sec sm" onclick="clearDetailFilters()">Limpar filtros</button>
    </div>

    <div style="overflow:auto;max-height:420px;">
      <table>
        <thead>
          <tr>
            <th>Data</th><th>Equipamento</th><th>Cliente</th><th>Nº</th>
            <th>Progresso</th><th>Material</th><th>Projeto</th><th>Obs / Problema</th>
          </tr>
        </thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="page-lista" class="page">
  <h2 class="section-title">Apontamentos (Histórico)</h2>
  <div class="filtros">
    <div>
      <label>Data inicial</label>
      <input type="date" id="fDataIni" class="input" onchange="renderLista()">
    </div>
    <div>
      <label>Data final</label>
      <input type="date" id="fDataFim" class="input" onchange="renderLista()">
    </div>
    <div>
      <label>Setor</label>
      <select id="fSetor" class="input" onchange="renderLista()">
        <option value="">Todos</option>
        <option>Corte e Dobra</option>
        <option>Pré Montagem</option>
        <option>Montagem</option>
        <option>Pintura</option>
        <option>Acabamento</option>
      </select>
    </div>
    <div>
      <label>Cliente</label>
      <input type="text" id="fCliente" class="input" placeholder="Nome cliente" oninput="renderLista()">
    </div>
    <div>
      <label>Produto</label>
      <input type="text" id="fProduto" class="input" placeholder="Equipamento" oninput="renderLista()">
    </div>
    <button class="btn sec sm" onclick="clearListaFilters()">Limpar filtros</button>
    <button class="btn pri sm" style="margin-left:auto" onclick="exportarCSV()">Exportar CSV</button>
  </div>

  <div style="overflow:auto;max-height:520px;">
    <table>
      <thead>
        <tr>
          <th>Data</th><th>Setor</th><th>Equipamento</th><th>Cliente</th><th>Nº</th>
          <th>Prog.</th><th>Material</th><th>Projeto</th><th>Obs / Problema</th>
        </tr>
      </thead>
      <tbody id="listaBody"></tbody>
    </table>
  </div>
</div>

// ======== Persistência opcional no navegador ========
function salvarLocal() {
  localStorage.setItem('megatec_ordens', JSON.stringify(ordens));
  localStorage.setItem('megatec_problemas', JSON.stringify(problemas));
  localStorage.setItem('megatec_notifs', JSON.stringify(notificacoes));
}
function carregarLocal() {
  const o = localStorage.getItem('megatec_ordens');
  const p = localStorage.getItem('megatec_problemas');
  const n = localStorage.getItem('megatec_notifs');
  if (o) ordens = JSON.parse(o);
  if (p) problemas = JSON.parse(p);
  if (n) notificacoes = JSON.parse(n);
}

// ======== Utilidades ========
function formatDate(iso) {
  if (!iso) return '';
  const [a,m,d] = iso.split('-');
  return `${d}/${m}/${a}`;
}
function showToast(msg, tipo='info') {
  const cont = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  if (tipo === 'ok') t.style.borderLeftColor = '#2e7d32';
  t.innerHTML = `
    <div class="toast-icon">${tipo==='ok'?'✅':'⚠️'}</div>
    <div class="toast-content">
      <div class="toast-title">${tipo==='ok'?'Sucesso':'Atenção'}</div>
      <div class="toast-msg">${msg}</div>
    </div>
    <button class="toast-close" onclick="this.parentElement.remove()">×</button>
  `;
  cont.appendChild(t);
  setTimeout(()=>t.remove(), 5000);
}

// ======== Navegação entre abas ========
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+pageId).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => {
    if (t.textContent.includes('Dashboard') && pageId==='dashboard') t.classList.add('active');
    if (t.textContent.includes('Linha') && pageId==='linha') t.classList.add('active');
    if (t.textContent.includes('Ordens') && pageId==='ordens') t.classList.add('active');
    if (t.textContent.includes('Apontamento') && pageId==='apontamento') t.classList.add('active');
    if (t.textContent.includes('Problemas') && pageId==='problemas') t.classList.add('active');
  });
  if (pageId==='ordens') renderTabelaOrdens();
  if (pageId==='linha') renderPipeline();
  if (pageId==='problemas') renderProblemas();
}

// ======== Notificações ========
function toggleNotifPanel() {
  const p = document.getElementById('notifPanel');
  p.classList.toggle('active');
}
function renderNotificacoes() {
  const list = document.getElementById('notifList');
  const aberto = notificacoes.filter(n=>!n.resolvido);
  document.getElementById('notifBadge').textContent = aberto.length;
  if (!notificacoes.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">Nenhuma notificação.</div></div>';
    return;
  }
  list.innerHTML = notificacoes.map(n=>`
    <div class="notif-item ${n.resolvido?'resolvido':''}" onclick="abrirProblemaPorNotif('${n.probId}')">
      <div class="notif-item-title">${n.titulo}</div>
      <div class="notif-item-sub">${n.sub}</div>
      <div class="notif-item-time">${n.time}</div>
    </div>
  `).join('');
}
function abrirProblemaPorNotif(id) {
  showPage('problemas');
  const el = document.getElementById('P'+id);
  if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

// ======== Tabela de Ordens (com editar) ========
function renderTabelaOrdens() {
  const tbody = document.getElementById('tabelaOrdensBody');
  const bus = document.getElementById('searchInput').value.toLowerCase();
  const etapa = document.getElementById('filterEtapa').value;
  const status = document.getElementById('filterStatus').value;

  let arr = [...ordens];
  if (bus) arr = arr.filter(o =>
    o.os.toLowerCase().includes(bus) ||
    o.cliente.toLowerCase().includes(bus) ||
    o.produto.toLowerCase().includes(bus)
  );
  if (etapa) arr = arr.filter(o => o.etapa===etapa);
  if (status) arr = arr.filter(o => o.status===status);

  // Ordenar por data de início (mais antiga primeiro)
  arr.sort((a,b)=> (a.inicio||'').localeCompare(b.inicio||''));

  if (!arr.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state-text" style="text-align:center;padding:16px">Nenhuma ordem encontrada.</td></tr>';
    return;
  }

  tbody.innerHTML = arr.map(o=>{
    const p = o.perc||0;
    let barClass = 'progress-bar';
    if (p<40) barClass += ' vermelho';
    else if (p<80) barClass += ' amarelo';
    const statusBadge =
      o.status==='Concluído' ? '<span class="badge badge-verde">Concluído</span>' :
      o.status==='Parado' ? '<span class="badge badge-vermelho">Parado</span>' :
      o.status==='Aguardando' ? '<span class="badge badge-amarelo">Aguardando</span>' :
      '<span class="badge badge-azul">Em andamento</span>';

    return `
      <tr>
        <td>${o.os}</td>
        <td>${o.cliente}</td>
        <td>${o.produto}</td>
        <td>${o.etapa}</td>
        <td>${statusBadge}</td>
        <td>${formatDate(o.inicio)}</td>
        <td>${formatDate(o.entrega)}</td>
        <td>
          <div style="min-width:130px">
            <div>${p}%</div>
            <div class="progress-bar-wrap">
              <div class="${barClass}" style="width:${p}%"></div>
            </div>
          </div>
        </td>
        <td>
          <button class="btn btn-sm btn-outline" onclick="carregarApontamento('${o.os}')">Editar</button>
        </td>
      </tr>
    `;
  }).join('');
}

// Carregar dados de uma OS no formulário de apontamento para edição
function carregarApontamento(os) {
  const o = ordens.find(x=>x.os===os);
  if (!o) return;
  showPage('apontamento');
  document.getElementById('ap_os').value = o.os;
  document.getElementById('ap_cliente').value = o.cliente;
  document.getElementById('ap_produto').value = o.produto;
  document.getElementById('ap_etapa').value = o.etapa;
  document.getElementById('ap_inicio').value = o.inicio;
  document.getElementById('ap_entrega').value = o.entrega;
  document.getElementById('ap_responsavel').value = o.responsavel || '';
  document.getElementById('ap_perc').value = o.perc || 0;
  document.getElementById('ap_obs').value = o.obs || '';

  // Se existe problema ligado à OS, já pré-preenche área de problema
  if (o.problema && o.problema.aberto) {
    document.getElementById('ap_temProblema').value = 'sim';
    toggleProblema();
    document.getElementById('ap_tipoProblema').value = o.problema.tipo;
    document.getElementById('ap_descProblema').value = o.problema.desc;
    document.getElementById('ap_respProblema').value = o.problema.resp;
  } else {
    document.getElementById('ap_temProblema').value = 'nao';
    toggleProblema();
    document.getElementById('ap_tipoProblema').value = 'Problema de Material';
    document.getElementById('ap_descProblema').value = '';
    document.getElementById('ap_respProblema').value = '';
  }
}

// Salvar apontamento (novo ou edição)
function salvarApontamento() {
  const os = document.getElementById('ap_os').value.trim();
  if (!os) { showToast('Informe o número da OS','warn'); return; }

  const obj = {
    os,
    cliente: document.getElementById('ap_cliente').value.trim(),
    produto: document.getElementById('ap_produto').value || '',
    etapa: document.getElementById('ap_etapa').value,
    inicio: document.getElementById('ap_inicio').value,
    entrega: document.getElementById('ap_entrega').value,
    responsavel: document.getElementById('ap_responsavel').value.trim(),
    perc: parseInt(document.getElementById('ap_perc').value||'0',10),
    obs: document.getElementById('ap_obs').value.trim(),
    status: 'Em andamento',
    problema:null
  };

  // Status derivado
  if (obj.perc>=100) obj.status = 'Concluído';

  // Problema
  const temProb = document.getElementById('ap_temProblema').value === 'sim';
  if (temProb) {
    const tipo = document.getElementById('ap_tipoProblema').value;
    const desc = document.getElementById('ap_descProblema').value.trim();
    const resp = document.getElementById('ap_respProblema').value.trim();
    obj.status = 'Parado';
    obj.problema = {
      id: obj.os+'_P'+Date.now(),
      tipo,
      desc,
      resp,
      aberto:true,
      solucao:'',
      resolvidoPor:'',
      resolvidoEm:''
    };
    // Se for novo problema, também entra em problemas[]
    const exists = problemas.find(p=>p.os===obj.os && p.desc===desc && p.aberto);
    if (!exists) {
      problemas.push({
        id: obj.problema.id,
        os: obj.os,
        cliente: obj.cliente,
        tipo,
        desc,
        resp,
        data: new Date().toISOString().slice(0,16).replace('T',' '),
        aberto:true,
        solucao:'',
        resolvidoPor:'',
        resolvidoEm:''
      });
    }
  }

  // Atualiza ou insere na lista de ordens
  const idx = ordens.findIndex(x=>x.os===os);
  if (idx>=0) {
    // manter id de problema se já existia e não foi alterado
    if (!obj.problema && ordens[idx].problema) {
      obj.problema = ordens[idx].problema;
    }
    ordens[idx] = {...ordens[idx], ...obj};
  } else {
    ordens.push(obj);
  }

  salvarLocal();
  showToast('Apontamento salvo com sucesso!','ok');
  renderTabelaOrdens();
}

// Limpar formulário
function limparApontamento() {
  document.getElementById('ap_os').value='';
  document.getElementById('ap_cliente').value='';
  document.getElementById('ap_produto').value='';
  document.getElementById('ap_etapa').value='Corte e Dobra';
  document.getElementById('ap_inicio').value='';
  document.getElementById('ap_entrega').value='';
  document.getElementById('ap_responsavel').value='';
  document.getElementById('ap_perc').value='';
  document.getElementById('ap_obs').value='';
  document.getElementById('ap_temProblema').value='nao';
  document.getElementById('ap_tipoProblema').value='Problema de Material';
  document.getElementById('ap_descProblema').value='';
  document.getElementById('ap_respProblema').value='';
  toggleProblema();
}

// Abrir detalhes da OS (modal)
function showDetalheOS(os) {
  const o = ordens.find(x=>x.os===os);
  if (!o) return;
  document.getElementById('modalDetalheTitle').textContent = `Detalhes da ${o.os}`;
  let problemaHtml='';
  if (o.problema) {
    problemaHtml = `
      <h4>Problema</h4>
      <p><b>Tipo:</b> ${o.problema.tipo}</p>
      <p><b>Descrição:</b> ${o.problema.desc}</p>
      <p><b>Responsável:</b> ${o.problema.resp}</p>
      <p><b>Status:</b> ${o.problema.aberto?'Em aberto':'Resolvido'}</p>
      ${o.problema.solucao ? `<p><b>Solução:</b> ${o.problema.solucao}</p>`:''}
    `;
  }
  document.getElementById('modalDetalheBody').innerHTML = `
    <p><b>Cliente:</b> ${o.cliente}</p>
    <p><b>Produto:</b> ${o.produto}</p>
    <p><b>Etapa:</b> ${o.etapa}</p>
    <p><b>Início:</b> ${formatDate(o.inicio)}</p>
    <p><b>Entrega:</b> ${formatDate(o.entrega)}</p>
    <p><b>Progresso:</b> ${o.perc||0}%</p>
    <p><b>Responsável:</b> ${o.responsavel||'-'}</p>
    <p><b>Observações:</b> ${o.obs||'-'}</p>
    ${problemaHtml}
  `;
  openModal('modalDetalhe');
}

// ======== Problemas (listar e resolver) ========
let problemaSelecionado = null;

function renderProblemas() {
  const lista = document.getElementById('listaProblemas');
  const filtroTipo = document.getElementById('filtroTipoProb').value;
  let arr = [...problemas];

  if (filtroTipo) arr = arr.filter(p=>p.tipo===filtroTipo);

  const abertos = arr.filter(p=>p.aberto);
  const resolvidos = arr.filter(p=>!p.aberto);

  document.getElementById('qtdProblemasAbertos').textContent = `● ${abertos.length} abertos`;
  document.getElementById('qtdProblemasResolvidos').textContent = `✓ ${resolvidos.length} resolvidos`;

  if (!arr.length) {
    lista.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-text">Nenhum problema registrado.</div></div>';
    return;
  }

  lista.innerHTML = arr.map(p=>{
    const classe = p.tipo.includes('Material') ? 'material' : 'engenharia';
    const aberto = p.aberto;
    const statusBadge = aberto ? '<span class="badge badge-vermelho">Em aberto</span>' : '<span class="badge badge-verde">Resolvido</span>';
    const solucaoHtml = !aberto && p.solucao ? `<div class="problema-desc"><b>Solução:</b> ${p.solucao} (${p.resolvidoPor||''} - ${p.resolvidoEm||''})</div>` : '';

    return `
      <div class="problema-item" id="P${p.id}">
        <div class="problema-icon ${classe}">${classe==='material'?'🔩':'📐'}</div>
        <div class="problema-info">
          <div class="problema-titulo">
            ${p.os} — ${p.cliente} ${statusBadge}
          </div>
          <div class="problema-desc">${p.desc}</div>
          <div class="problema-meta">
            <span><b>Tipo:</b> ${p.tipo}</span>
            <span><b>Responsável:</b> ${p.resp}</span>
            <span><b>Data:</b> ${p.data}</span>
          </div>
          ${solucaoHtml}
        </div>
        <div class="problema-actions">
          ${aberto?`<button class="btn btn-sm btn-primary" onclick="abrirLiberacao('${p.id}')">Resolver</button>`:''}
        </div>
      </div>
    `;
  }).join('');
}

// Abrir modal de liberação para resolver problema
function abrirLiberacao(id) {
  problemaSelecionado = problemas.find(p=>p.id===id);
  if (!problemaSelecionado) return;
  document.getElementById('lib_responsavel').value = '';
  document.getElementById('lib_acao').value = '';
  openModal('modalLiberacao');
}

// Confirmar liberação (resolver problema)
function confirmarLiberacao() {
  if (!problemaSelecionado) return;
  const resp = document.getElementById('lib_responsavel').value.trim();
  const acao = document.getElementById('lib_acao').value.trim();
  if (!resp || !acao) {
    showToast('Informe responsável e ação tomada para resolver.','warn');
    return;
  }

  // Atualiza na lista de problemas
  problemas = problemas.map(p=>{
    if (p.id===problemaSelecionado.id) {
      return {
        ...p,
        aberto:false,
        solucao:acao,
        resolvidoPor:resp,
        resolvidoEm:new Date().toLocaleString('pt-BR')
      };
    }
    return p;
  });

  // Atualiza também a OS relacionada
  ordens = ordens.map(o=>{
    if (o.os===problemaSelecionado.os && o.problema && o.problema.id===problemaSelecionado.id) {
      return {
        ...o,
        status: (o.perc>=100?'Concluído':'Em andamento'),
        problema: {
          ...o.problema,
          aberto:false,
          solucao:acao,
          resolvidoPor:resp,
          resolvidoEm:new Date().toLocaleString('pt-BR')
        }
      };
    }
    return o;
  });

  // Marca notificação como resolvida
  notificacoes = notificacoes.map(n=>{
    if (n.probId===problemaSelecionado.id) return {...n,resolvido:true};
    return n;
  });

  salvarLocal();
  closeModal('modalLiberacao');
  showToast('Problema marcado como resolvido e etapa liberada.','ok');
  renderProblemas();
  renderTabelaOrdens();
  renderNotificacoes();
}

// ======== Linha de produção (pipeline simples) ========
function renderPipeline() {
  const board = document.getElementById('pipelineBoard');
  const cols = {
    'Corte e Dobra':[],
    'Pré-Montagem':[],
    'Montagem':[],
    'Pintura':[],
    'Acabamento/Finalização':[]
  };
  ordens.forEach(o=>{
    if (cols[o.etapa]) cols[o.etapa].push(o);
  });

  board.innerHTML = '';
  const etapasKeys = ['corte','premontagem','montagem','pintura','acabamento'];
  const etapasNomes = Object.keys(cols);
  etapasNomes.forEach((nome,idx)=>{
    const lista = cols[nome];
    const cls = ['corte','premontagem','montagem','pintura','acabamento'][idx] || 'corte';
    const htmlCards = lista.map(o=>{
      const parado = o.status==='Parado';
      const atencao = (o.problema && !o.problema.aberto)?false:(!parado && o.perc<50);
      const classeCard = parado?'pipeline-card parado':(atencao?'pipeline-card atencao':'pipeline-card');
      const hasProb = o.problema && o.problema.aberto;
      return `
        <div class="${classeCard}" onclick="showDetalheOS('${o.os}')">
          <div class="pipeline-card-os">${o.os}</div>
          <div class="pipeline-card-cliente">${o.cliente}</div>
          <div class="pipeline-card-produto">${o.produto}</div>
          <div style="font-size:11px;margin-top:4px;color:var(--texto-muted)">
            ${o.perc||0}% • Prev. ${formatDate(o.entrega)}
          </div>
          <div class="pipeline-card-icons">
            ${hasProb && o.problema.tipo.includes('Material')?'<div class="icon-alert icon-material">M</div>':''}
            ${hasProb && o.problema.tipo.includes('Engenharia')?'<div class="icon-alert icon-engenharia">E</div>':''}
          </div>
        </div>
      `;
    }).join('');

    board.innerHTML += `
      <div class="pipeline-col">
        <div class="pipeline-header ${cls}">
          <span>${nome}</span>
          <span class="pipeline-count">${lista.length}</span>
        </div>
        <div class="pipeline-items">
          ${lista.length?htmlCards:'<div class="text-muted" style="font-size:12px">Nenhuma OS nesta etapa.</div>'}
        </div>
      </div>
    `;
  });
}

// ======== Form problema toggle ========
function toggleProblema() {
  const tem = document.getElementById('ap_temProblema').value==='sim';
  document.getElementById('grp_tipoProblema').style.display = tem?'block':'none';
  document.getElementById('grp_descProblema').style.display = tem?'block':'none';
  document.getElementById('grp_responsavelProblema').style.display = tem?'block':'none';
}

// ======== Modal helpers ========
function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }

// ======== Filtros de ordens (inputs) ========
function filtrarOrdens(){
  renderTabelaOrdens();
}

// ======== Inicialização ========
(function init(){
  carregarLocal();
  renderTabelaOrdens();
  renderProblemas();
  renderPipeline();
  renderNotificacoes();
})();
</script>
